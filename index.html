    <title>V-Bucks مجانا - شحن فورتنيت الرسمي 2026</title>
    <link rel="icon" type="image/png" href="https://files.manuscdn.com/user_upload_by_module/session_file/310519663829463533/utflKOumZZVkiksG.png">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Black+Ops+One&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #f7eb0a;
            --secondary: #2cc1ff;
            --accent: #8e44ad;
            --bg: #020408;
            --card: rgba(10, 15, 25, 0.95);
            --success: #00ff88;
            --error: #ff3e3e;
            --border: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        
        body {
            margin: 0;
            background: var(--bg);
            color: #fff;
            font-family: 'Cairo', sans-serif;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(44, 193, 255, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(142, 68, 173, 0.08) 0%, transparent 40%),
                url('https://files.manuscdn.com/user_upload_by_module/session_file/310519663829463533/opLVNiGpMpGPfmSl.jpg');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.75);
            z-index: -1;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 40px 15px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            animation: dropIn 0.6s ease-out;
        }

        .logo {
            max-width: 220px;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.1));
        }

        .card {
            width: 100%;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 35px 25px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
            position: relative;
            animation: slideUp 0.5s ease-out;
            text-align: center;
        }

        h1 {
            font-family: 'Black Ops One', cursive;
            font-size: 2.2rem;
            color: var(--primary);
            text-shadow: 0 2px 8px rgba(247, 235, 10, 0.2);
            margin: 0 0 10px 0;
            text-transform: uppercase;
        }

        .status-tag {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 255, 136, 0.05);
            color: var(--success);
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 900;
            margin-bottom: 25px;
            border: 1px solid rgba(0, 255, 136, 0.2);
        }

        .status-tag::before {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--success);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--success);
            animation: pulse 1.5s infinite;
        }

        /* Inputs */
        .input-group {
            margin-bottom: 25px;
        }

        input[type="text"] {
            width: 100%;
            padding: 16px;
            background: rgba(0,0,0,0.4);
            border: 1px solid #2a2f3e;
            border-radius: 12px;
            color: #fff;
            font-size: 1.1rem;
            text-align: center;
            transition: 0.3s;
        }

        input[type="text"]:focus {
            border-color: var(--secondary);
            background: rgba(0,0,0,0.6);
        }

        /* Selection Grid - Optimized */
        .vbucks-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 30px;
        }

        .v-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid #2a2f3e;
            border-radius: 16px;
            padding: 20px 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .v-card:hover {
            border-color: var(--secondary);
            background: rgba(44, 193, 255, 0.03);
        }

        .v-card.active {
            border-color: var(--primary);
            background: rgba(247, 235, 10, 0.05);
            transform: scale(1.02);
        }

        .v-card img {
            width: 60px;
            margin-bottom: 10px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
        }

        .v-card .v-amt {
            display: block;
            font-family: 'Black Ops One', cursive;
            font-size: 1.2rem;
        }

        /* Buttons - Modern & Integrated */
        .main-btn {
            background: linear-gradient(180deg, var(--primary) 0%, #d4c800 100%);
            color: #000;
            border: none;
            padding: 16px;
            font-size: 1.4rem;
            font-weight: 900;
            border-radius: 12px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 5px 0 #8a8200;
            transition: 0.1s;
            width: 100%;
        }

        .main-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #8a8200;
        }

        /* Terminal - Sleek */
        .terminal {
            display: none;
            background: #000;
            border-radius: 12px;
            padding: 20px;
            text-align: left;
            font-family: monospace;
            font-size: 0.8rem;
            margin-top: 20px;
            border: 1px solid #222;
            height: 180px;
            overflow: hidden;
        }

        .line { margin-bottom: 5px; opacity: 0; animation: fadeIn 0.2s forwards; }
        .l-blue { color: var(--secondary); }
        .l-green { color: var(--success); }
        .l-red { color: var(--error); }

        /* Verification Area - Clean */
        .verify-zone {
            display: none;
            animation: zoomIn 0.4s;
        }

        .timer {
            color: var(--error);
            font-weight: bold;
            font-size: 0.9rem;
            margin-bottom: 20px;
            padding: 8px;
            background: rgba(255, 62, 62, 0.05);
            border-radius: 8px;
            display: inline-block;
        }

        .cpa-btn {
            background: linear-gradient(180deg, var(--success) 0%, #00d471 100%);
            color: #000;
            border: none;
            padding: 18px;
            font-size: 1.5rem;
            font-weight: 900;
            border-radius: 12px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 5px 0 #008a4a;
            transition: 0.1s;
            width: 100%;
            text-decoration: none;
            display: block;
            margin-top: 20px;
        }

        .cpa-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #008a4a;
        }

        @keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }
        @keyframes dropIn { from { transform: translateY(-30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes fadeIn { to { opacity: 1; } }
        @keyframes zoomIn { from { transform: scale(0.98); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        @media (max-width: 480px) {
            h1 { font-size: 1.8rem; }
            .card { padding: 25px 15px; }
        }
    </style>

<body>
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-TJFD5KHB"

    <div class="overlay"></div>

    <div class="container">
        <div class="header">
            <img src="https://files.manuscdn.com/user_upload_by_module/session_file/310519663829463533/utflKOumZZVkiksG.png" class="logo" alt="Fortnite">
        </div>

        <div class="card">
            <div id="p1">
                <div class="status-tag">النظام نشط - شحن مباشر</div>
                <h1>بوابة شحن V-BUCKS</h1>
                <p style="color: #888; margin-bottom: 25px; font-size: 0.95rem;">أدخل معرف الحساب لبدء عملية الشحن</p>
                
                <div class="input-group">
                    <input type="text" id="uid" placeholder="اسم المستخدم في Epic Games...">
                </div>
                
                <button class="main-btn" onclick="goP2()">شحن الآن</button>
            </div>

            <div id="p2" style="display:none;">
                <h1>اختر كمية الشحن</h1>
                <p style="color: #888; margin-bottom: 25px; font-size: 0.95rem;">سيتم حقن الرصيد فور إتمام التحقق</p>
                
                <div class="vbucks-grid">
                    <div class="v-card" onclick="sel(this, '2,500')">
                        <img src="https://files.manuscdn.com/user_upload_by_module/session_file/310519663829463533/rfbaqNQACvwKHpVv.png">
                        <span class="v-amt">2,500</span>
                    </div>
                    <div class="v-card" onclick="sel(this, '5,000')">
                        <img src="https://files.manuscdn.com/user_upload_by_module/session_file/310519663829463533/rfbaqNQACvwKHpVv.png">
                        <span class="v-amt">5,000</span>
                    </div>
                    <div class="v-card" onclick="sel(this, '10,000')">
                        <img src="https://files.manuscdn.com/user_upload_by_module/session_file/310519663829463533/rfbaqNQACvwKHpVv.png">
                        <span class="v-amt">10,000</span>
                    </div>
                    <div class="v-card" onclick="sel(this, '22,500')">
                        <img src="https://files.manuscdn.com/user_upload_by_module/session_file/310519663829463533/rfbaqNQACvwKHpVv.png">
                        <span class="v-amt">22,500</span>
                    </div>
                </div>
                
                <button class="main-btn" onclick="run()">تأكيد الشحن</button>
            </div>

            <div id="term" class="terminal"></div>

            <div id="v-zone" class="verify-zone">
                <div class="timer">تنتهي العملية خلال: <span id="tm">03:00</span></div>
                <h2 style="color: var(--secondary); margin: 0 0 10px 0;">التحقق مطلوب</h2>
                <p style="color: #bbb; font-size: 0.9rem; margin-bottom: 20px;">تم تجهيز العملات! يرجى إكمال عملية التحقق لتأكيد هويتك وضمان وصول الرصيد.</p>
                
                <a href="https://jhuweq.com/cl/dbd2d92" class="cpa-btn" onclick="call_locker();">تحقق الآن</a>
            </div>
        </div>
    </div>

    <script>
        let sV = ""; let u = "";
        
        function goP2() {
            u = document.getElementById('uid').value;
            if(u.length < 3) return alert("أدخل اسم المستخدم");
            document.getElementById('p1').style.display = 'none';
            document.getElementById('p2').style.display = 'block';
        }
        function sel(e, a) {
            document.querySelectorAll('.v-card').forEach(b => b.classList.remove('active'));
            e.classList.add('active'); sV = a;
        }
        function addL(t, s) {
            const c = document.getElementById('term');
            const l = document.createElement('div');
            l.className = `line ${s}`; l.innerText = `> ${t}`;
            c.appendChild(l); c.scrollTop = c.scrollHeight;
        }
        function run() {
            if(!sV) return alert("اختر الكمية");
            document.getElementById('p2').style.display = 'none';
            document.getElementById('term').style.display = 'block';
            const logs = [
                {t: "Connecting to Epic Games Servers...", s: "l-blue"},
                {t: "Searching for user: " + u, s: ""},
                {t: "User found! Status: Active", s: "l-green"},
                {t: "Injecting " + sV + " V-Bucks...", s: "l-blue"},
                {t: "Error: Human Verification Required!", s: "l-red"}
            ];
            let i = 0;
            const iv = setInterval(() => {
                if(i < logs.length) { addL(logs[i].t, logs[i].s); i++; }
                else {
                    clearInterval(iv);
                    setTimeout(() => {
                        document.getElementById('term').style.display = 'none';
                        document.getElementById('v-zone').style.display = 'block';
                        let t = 180;
                        setInterval(() => {
                            let m = Math.floor(t / 60); let s = t % 60;
                            document.getElementById('tm').innerText = `${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
                            if(t > 0) t--;
                        }, 1000);
                        // Call the locker automatically when reaching verification zone
                        if(typeof call_locker === 'function') {
                            call_locker();
                        }
                    }, 1000);
                }
            }, 800);
        }
    </script>
